version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: astram-backend
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      # Optional: mount models directory if you want to inspect or update models on host
      # - ./models:/app/models
    restart: always
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: astram-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
